services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://drunkard:${DB_PASSWORD}@db:5432/drunkard
      - JWT_SECRET=${JWT_SECRET}
      - WECHAT_APP_ID=${WECHAT_APP_ID}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET}
      - SERVER_URL=${SERVER_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - INVITE_CODE=${INVITE_CODE}
      - ADMIN_PHONE=${ADMIN_PHONE}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NODE_ENV=production
      - PORT=3000
      - UPLOAD_DIR=./uploads
    command: sh -c "npx prisma db push && node dist/index.js"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=drunkard
      - POSTGRES_USER=drunkard
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drunkard"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      # Temporary direct-IP deployment:
      - "18080:80"
      # If a host Nginx/Caddy/BT panel proxies traffic, prefer:
      # - "127.0.0.1:18080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/var/www/uploads:ro
      - ./app/build/web:/var/www/web:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  uploads:
